syntax = "proto3";
package com.upstox.marketdatafeeder.rpc.proto;

message FeedResponse {
    enum Type {
        initial_feed = 0;
        live_feed = 1;
    }
    Type type = 1;
    map<string, Feed> feeds = 2;
}

message Feed {
    oneof FeedUnion {
        LTPC ltpc = 1;
        FullFeed fullFeed = 2;
        OptionGreekFeed optionGreekFeed = 3;
    }
}

message LTPC {
    double ltp = 1;
    int64 ltt = 2;
    int64 ltq = 3;
    double cp = 4;
}

message FullFeed {
    MarketFullFeed marketFF = 1;
}

message MarketFullFeed {
    LTPC ltpc = 1;
    MarketLevel marketLevel = 2;
    OptionGreeks optionGreeks = 3;
    MarketOHLC marketOHLC = 4;
    double atp = 5;
    double vtt = 6;
    double oi = 7;
    double close = 8;
}

message MarketLevel {
    repeated Quote bidAskQuote = 1;
}

message Quote {
    int32 bq = 1;
    double bp = 2;
    int32 bno = 3;
    int32 aq = 4;
    double ap = 5;
    int32 ano = 6;
}

message OptionGreeks {
    double op = 1;
    double up = 2;
    double iv = 3;
    double delta = 4;
    double theta = 5;
    double gamma = 6;
    double vega = 7;
    double rho = 8;
}

message MarketOHLC {
    repeated OHLC ohlc = 1;
}

message OHLC {
    string interval = 1;
    double open = 2;
    double high = 3;
    double low = 4;
    double close = 5;
    int32 volume = 6;
    int64 ts = 7;
}

message OptionGreekFeed {
    OptionGreeks optionGreeks = 1;
}
